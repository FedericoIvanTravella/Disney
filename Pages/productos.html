<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="encabezado">
      <img src="../src/Logo.png" alt="Logo" title="Home" />
      <nav class="menu">
        <a href="../contactos.html" class="btn_menu">Contactos</a>
        <a href="../clasicos.html" class="btn_menu">Clásicos</a>
        <a href="../productos.html" class="btn_menu">Productos</a>
        <a href="../pixar.html" class="btn_pixar">Pixar</a>
      </nav>
    </header>

    <main>
      <div class="productos">
        <div class="contenedor_form">
        <input type="text" id="Filtro" placeholder="  Buscar producto..." />
        <select id="ordenar">
          <option value="">Ordenar por precio</option>
          <option value="menor">Menor precio</option>
          <option value="mayor">Mayor precio</option>
        </select>
        <div class="iconos">
          <img
            src="../src/ico/1.png"
            alt="Todo"
            class="btn-todo"
            id="todo"
            title="Borrar Filtros"
          />
          <img
            src="../src/ico/2.png"
            alt="Funko"
            class="btn-funko"
            id="funko"
            title="Funkos"
          />
          <img
            src="../src/ico/3.png"
            alt="Buzo"
            class="btn-buzo"
            id="buzo"
            title="Buzos"
          />
          <img
            src="../src/ico/4.jpg"
            alt="Poster"
            class="btn-poster"
            id="poster"
            title="Posters"
          />
        </div>
      </div>
      <div class="contenedor"></div>
      <div class="Favorito"></div>
      </div>
    </main>

    <footer>
      <div class="infofooter">
        <img src="../src/Logo.png" alt="" />
        <p>© Disney. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
